version: "3.9"

services:
  engine:
    build:
      context: ../engine
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    networks:
      - searchnet
    depends_on:
      - db
    profiles:
      - full

  api:
    build:
      context: ../api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    environment:
      - ENGINE_URL=http://engine:8080
    networks:
      - searchnet

  web:
    build:
      context: ../web
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
    networks:
      - searchnet
    depends_on:
      - api

  db:
    image: pgvector/pgvector:pg16
    env_file:
      - ../.env
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    networks:
      - searchnet

    profiles:
      - full

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U search -d searchdb"]
      interval: 5s
      timeout: 3s
      retries: 5

networks:
  searchnet:
    driver: bridge

volumes:
  pgdata:
